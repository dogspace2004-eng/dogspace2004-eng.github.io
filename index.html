<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Планировщик">
<meta name="theme-color" content="#f5f5f7">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.png">
<title>Мой планировщик</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px;background:#f5f5f7;color:#1d1d1f}
.app{max-width:1100px;margin:0 auto;padding:max(env(safe-area-inset-top),20px) 16px 20px}
.header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:18px;gap:12px;flex-wrap:wrap}
.header-left h1{font-size:19px;font-weight:600}
.header-date{font-size:12px;color:#6e6e73;margin-top:3px}
.header-clock{font-size:26px;font-weight:300;letter-spacing:-0.5px;text-align:right}
.header-clock-sub{font-size:11px;color:#8e8e93;text-align:right;margin-top:1px}
.tab-bar{display:flex;gap:0;border-bottom:1px solid #d2d2d7;margin-bottom:18px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.tab{padding:8px 14px;font-size:13px;color:#6e6e73;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;white-space:nowrap;background:none;border-top:none;border-left:none;border-right:none;font-family:inherit}
.tab.active{color:#1d1d1f;font-weight:500;border-bottom-color:#1d1d1f}
.view{display:none}.view.active{display:block}
.card{background:#fff;border:1px solid #e5e5ea;border-radius:12px;padding:14px 16px;margin-bottom:12px}
.section-label{font-size:11px;color:#8e8e93;text-transform:uppercase;letter-spacing:0.05em;font-weight:500;margin-bottom:8px}
input[type=text],input[type=time],input[type=number],textarea,select{background:#f5f5f7;border:1px solid #d2d2d7;border-radius:8px;padding:7px 10px;font-size:13px;color:#1d1d1f;outline:none;width:100%;font-family:inherit}
input:focus,textarea:focus,select:focus{border-color:#007aff;background:#fff}
button{background:#fff;border:1px solid #d2d2d7;border-radius:8px;padding:6px 13px;font-size:13px;color:#1d1d1f;cursor:pointer;font-family:inherit;white-space:nowrap}
button:hover{background:#f5f5f7}
button.primary{background:#007aff;color:#fff;border-color:#007aff}
button.primary:hover{background:#0066d6}
button.danger{color:#ff3b30}
button.small{padding:2px 8px;font-size:12px}
.row{display:flex;gap:8px;align-items:flex-start;flex-wrap:wrap}
.row>*{min-width:0}
.avatar{width:24px;height:24px;border-radius:50%;background:#e8f0fe;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;color:#1a73e8;flex-shrink:0}
.empty{color:#8e8e93;font-size:13px;padding:16px 0;text-align:center}
.badge{display:inline-block;font-size:11px;padding:1px 6px;border-radius:10px;background:#f5f5f7;color:#6e6e73;margin-left:5px}
.price-row{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid #f2f2f7}
.price-row:last-child{border-bottom:none}
.bar-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.bar-track{flex:1;height:7px;background:#f2f2f7;border-radius:4px;overflow:hidden}
.bar-fill{height:100%;background:#007aff;border-radius:4px}

/* TODAY */
.today-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:14px}
.today-stat{background:#fff;border:1px solid #e5e5ea;border-radius:12px;padding:13px;text-align:center}
.today-stat-val{font-size:22px;font-weight:600;color:#1d1d1f}
.today-stat-lbl{font-size:11px;color:#8e8e93;margin-top:3px}
.today-stat.green .today-stat-val{color:#34c759}
.today-stat.blue .today-stat-val{color:#007aff}
.timeline{display:flex;flex-direction:column;gap:6px}
.tl-item{display:flex;gap:10px;align-items:flex-start;padding:10px 12px;background:#fff;border:1px solid #e5e5ea;border-radius:10px;position:relative;overflow:hidden}
.tl-item::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px}
.tl-item.ev-lesson::before{background:#3b82f6}
.tl-item.ev-work::before{background:#10b981}
.tl-item.ev-uni::before{background:#8b5cf6}
.tl-item.ev-personal::before{background:#f472b6}
.tl-item.past{opacity:0.45}
.tl-time{font-size:12px;font-weight:600;color:#6e6e73;min-width:78px;margin-top:1px}
.tl-name{font-size:13px;font-weight:500}
.tl-sub{font-size:11px;color:#8e8e93;margin-top:2px}
.tl-earn{font-size:12px;font-weight:600;color:#34c759;margin-left:auto;flex-shrink:0;margin-top:1px}
.goals-list{display:flex;flex-direction:column;gap:6px}
.goal-item{display:flex;align-items:center;gap:10px;padding:9px 12px;background:#fff;border:1px solid #e5e5ea;border-radius:10px;cursor:pointer}
.goal-item.done-goal{opacity:0.5}
.goal-check{width:18px;height:18px;border-radius:50%;border:1.5px solid #d2d2d7;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:11px}
.goal-item.done-goal .goal-check{background:#34c759;border-color:#34c759;color:#fff}
.goal-text{flex:1;font-size:13px}
.goal-item.done-goal .goal-text{text-decoration:line-through;color:#8e8e93}
.goal-add-row{display:flex;gap:8px;margin-top:8px}

/* CALENDAR */
.cal-toolbar{display:flex;align-items:center;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.cal-toolbar button{padding:5px 11px;font-size:13px}
.week-label{font-size:13px;font-weight:500}
.cal-legend{display:flex;gap:10px;flex-wrap:wrap;margin-left:auto}
.leg-item{display:flex;align-items:center;gap:4px;font-size:11px;color:#6e6e73}
.leg-dot{width:10px;height:10px;border-radius:3px;flex-shrink:0}
.cal-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
.cal-grid{display:grid;grid-template-columns:44px repeat(7,1fr);min-width:540px;border:1px solid #e5e5ea;border-radius:12px;overflow:hidden;background:#fff}
.cal-head-cell{background:#f9f9f9;border-bottom:1px solid #e5e5ea;padding:7px 4px;text-align:center;font-size:11px;font-weight:500;color:#6e6e73}
.cal-head-cell.today-col{color:#007aff}
.cal-day-num{font-size:15px;font-weight:600;line-height:1.1}
.cal-head-cell.today-col .cal-day-num{color:#007aff}
.cal-time-head{background:#f9f9f9;border-bottom:1px solid #e5e5ea}
.cal-body{grid-column:1/-1;display:grid;grid-template-columns:44px repeat(7,1fr);position:relative}
.cal-time-col{border-right:1px solid #f0f0f0}
.cal-time-slot{height:48px;border-bottom:1px solid #f5f5f5;display:flex;align-items:flex-start;justify-content:flex-end;padding:2px 5px 0 0;font-size:10px;color:#c0c0c0}
.cal-day-col{border-right:1px solid #f0f0f0;position:relative;min-height:768px}
.cal-day-col:last-child{border-right:none}
.cal-day-col.today-col{background:#fafcff}
.cal-hour-line{position:absolute;left:0;right:0;border-top:1px solid #f0f0f0;pointer-events:none}
.cal-half-line{position:absolute;left:0;right:0;border-top:1px dashed #f5f5f5;pointer-events:none}
.cal-drop-zone{position:absolute;left:2px;right:2px;top:0;bottom:0}
.cal-drop-zone.drag-over{background:rgba(0,122,255,0.07);border-radius:8px}
.cal-event{position:absolute;left:2px;right:2px;border-radius:6px;padding:3px 5px;font-size:11px;line-height:1.3;cursor:grab;overflow:hidden;z-index:2;user-select:none;border:none;text-align:left}
.cal-event:active{cursor:grabbing;opacity:0.8;z-index:10}
.cal-event-name{font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cal-event-time{opacity:0.75;font-size:10px}
.cal-event-comment{font-size:10px;opacity:0.8;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cal-event-recur{font-size:9px;opacity:0.6}
.cal-event .del-btn{position:absolute;top:2px;right:3px;font-size:10px;background:none;border:none;cursor:pointer;opacity:0;padding:0;color:inherit;font-weight:700}
.cal-event:hover .del-btn{opacity:0.7}
.ev-lesson{background:#dbeafe;color:#1e40af}
.ev-work{background:#d1fae5;color:#065f46}
.ev-uni{background:#ede9fe;color:#5b21b6}
.ev-personal{background:#fce7f3;color:#9d174d}
.now-line{position:absolute;left:0;right:0;z-index:5;pointer-events:none}
.now-line-inner{border-top:2px solid #ff3b30;position:relative}
.now-dot{width:8px;height:8px;border-radius:50%;background:#ff3b30;position:absolute;top:-4px;left:-1px}

/* STATS */
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin-bottom:12px}
.stat-card{background:#fff;border:1px solid #e5e5ea;border-radius:12px;padding:13px;text-align:center}
.stat-val{font-size:21px;font-weight:600}
.stat-lbl{font-size:11px;color:#8e8e93;margin-top:2px}

/* MODAL */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.35);z-index:100;align-items:center;justify-content:center}
.modal-bg.open{display:flex}
.modal{background:#fff;border-radius:16px;padding:20px;width:360px;max-width:93vw;max-height:90vh;overflow-y:auto}
.modal h2{font-size:16px;font-weight:600;margin-bottom:14px}
.modal .field{margin-bottom:10px}
.modal .field label{font-size:12px;color:#6e6e73;display:block;margin-bottom:4px}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:14px}
.type-btns{display:flex;gap:6px;flex-wrap:wrap}
.type-btn{padding:5px 11px;font-size:12px;border-radius:20px;border:1px solid #d2d2d7;background:#fff;cursor:pointer}
.type-btn.sel-lesson{background:#dbeafe;color:#1e40af;border-color:#bfdbfe}
.type-btn.sel-work{background:#d1fae5;color:#065f46;border-color:#a7f3d0}
.type-btn.sel-uni{background:#ede9fe;color:#5b21b6;border-color:#ddd6fe}
.type-btn.sel-personal{background:#fce7f3;color:#9d174d;border-color:#fbcfe8}
.recur-btns{display:flex;gap:6px;flex-wrap:wrap}
.recur-btn{padding:5px 11px;font-size:12px;border-radius:20px;border:1px solid #d2d2d7;background:#fff;cursor:pointer}
.recur-btn.sel{background:#1d1d1f;color:#fff;border-color:#1d1d1f}

/* DELETE MODAL */
.del-modal{background:#fff;border-radius:16px;padding:20px;width:300px;max-width:92vw}
.del-modal h2{font-size:15px;font-weight:600;margin-bottom:4px}
.del-modal p{font-size:13px;color:#6e6e73;margin-bottom:14px}
.del-options{display:flex;flex-direction:column;gap:8px}
.del-option{padding:10px 14px;border:1px solid #e5e5ea;border-radius:10px;cursor:pointer;font-size:13px;background:#fff;text-align:left;font-family:inherit}
.del-option:hover{background:#f5f5f7}
.del-option.red{color:#ff3b30;border-color:#ffd6d4}
.del-option.red:hover{background:#fff5f5}

/* PROFILE */
.profile-screen{position:fixed;inset:0;background:#f5f5f7;z-index:200;display:flex;align-items:center;justify-content:center}
.profile-box{background:#fff;border-radius:20px;padding:28px 24px;width:320px;max-width:90vw;border:1px solid #e5e5ea}
.profile-box h2{font-size:18px;font-weight:600;margin-bottom:6px;text-align:center}
.profile-box p{font-size:13px;color:#6e6e73;text-align:center;margin-bottom:20px}
.profile-list{display:flex;flex-direction:column;gap:8px;margin-bottom:16px}
.profile-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border:1px solid #e5e5ea;border-radius:10px;cursor:pointer;background:#fff}
.profile-item:hover{background:#f5f5f7}
.profile-avatar{width:36px;height:36px;border-radius:50%;background:#e8f0fe;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:600;color:#1a73e8;flex-shrink:0}
.profile-name{flex:1;font-size:14px;font-weight:500}
.profile-meta{font-size:11px;color:#8e8e93}
.new-profile-row{display:flex;gap:8px}
.profile-indicator{display:flex;align-items:center;gap:5px;cursor:pointer;padding:4px 9px;border-radius:8px;border:1px solid #e5e5ea;background:#fff;font-size:12px;color:#6e6e73}
.profile-indicator:hover{background:#f5f5f7}
</style>
</head>
<body>

<!-- PROFILE -->
<div class="profile-screen" id="profile-screen">
  <div class="profile-box">
    <h2>Планировщик</h2>
    <p>Выбери профиль или создай новый</p>
    <div class="profile-list" id="profile-list"></div>
    <div class="new-profile-row">
      <input type="text" id="new-profile-name" placeholder="Имя нового профиля" style="flex:1" onkeydown="if(event.key==='Enter')createProfile()">
      <button class="primary" onclick="createProfile()">+</button>
    </div>
  </div>
</div>

<div class="app" id="main-app" style="display:none">
  <div class="header">
    <div class="header-left">
      <h1>Мой планировщик</h1>
      <div class="header-date" id="header-date"></div>
    </div>
    <div style="display:flex;flex-direction:column;align-items:flex-end;gap:5px">
      <div class="header-clock" id="header-clock"></div>
      <div class="header-clock-sub" id="header-clock-sub"></div>
      <div class="profile-indicator" id="profile-indicator" onclick="switchProfile()"></div>
    </div>
  </div>

  <div class="tab-bar">
    <button class="tab active" onclick="sw('today')">Сегодня</button>
    <button class="tab" onclick="sw('calendar')">Календарь</button>
    <button class="tab" onclick="sw('stats')">Статистика</button>
    <button class="tab" onclick="sw('students')">Ученики</button>
  </div>

  <!-- TODAY -->
  <div id="v-today" class="view active">
    <div class="today-grid" id="today-stats"></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px" id="today-cols">
      <div>
        <div class="section-label" style="margin-bottom:8px">События сегодня</div>
        <div class="timeline" id="today-timeline"></div>
      </div>
      <div>
        <div class="section-label" style="margin-bottom:8px">Цели на день</div>
        <div class="goals-list" id="goals-list"></div>
        <div class="goal-add-row">
          <input type="text" id="new-goal" placeholder="Новая цель..." onkeydown="if(event.key==='Enter')addGoal()">
          <button class="primary" onclick="addGoal()">+</button>
        </div>
      </div>
    </div>
    <style>@media(max-width:600px){#today-cols{grid-template-columns:1fr!important}}</style>
  </div>

  <!-- CALENDAR -->
  <div id="v-calendar" class="view">
    <div class="cal-toolbar">
      <button onclick="shiftWeek(-1)">&#8249;</button>
      <button onclick="goToday()">Сегодня</button>
      <button onclick="shiftWeek(1)">&#8250;</button>
      <span class="week-label" id="week-label"></span>
      <div class="cal-legend">
        <div class="leg-item"><div class="leg-dot" style="background:#93c5fd"></div>Урок</div>
        <div class="leg-item"><div class="leg-dot" style="background:#6ee7b7"></div>Работа</div>
        <div class="leg-item"><div class="leg-dot" style="background:#c4b5fd"></div>Пары</div>
        <div class="leg-item"><div class="leg-dot" style="background:#f9a8d4"></div>Личное</div>
      </div>
    </div>
    <div class="cal-wrap"><div class="cal-grid" id="cal-grid"></div></div>
  </div>

  <!-- STATS -->
  <div id="v-stats" class="view">
    <div class="stat-grid" id="stat-grid"></div>
    <div class="card"><div class="section-label">Доход по ученикам (неделя)</div><div id="income-breakdown"></div></div>
    <div class="card"><div class="section-label">По дням</div><div id="days-breakdown"></div></div>
  </div>

  <!-- STUDENTS -->
  <div id="v-students" class="view">
    <div class="card">
      <div class="section-label">Добавить ученика</div>
      <div class="row" style="margin-top:6px">
        <div style="flex:1;min-width:110px"><input type="text" id="new-sname" placeholder="Имя"></div>
        <div style="flex:0 0 100px"><input type="number" id="new-sprice" placeholder="₽/час" min="0"></div>
        <div style="flex:1;min-width:150px"><input type="text" id="new-scomment" placeholder="Комментарий"></div>
        <button class="primary" onclick="addStudent()">Добавить</button>
      </div>
    </div>
    <div class="card"><div class="section-label">Список</div><div id="students-list"></div></div>
  </div>
</div>

<!-- EVENT MODAL -->
<div class="modal-bg" id="modal-bg" onclick="if(event.target===this)closeModalDirect()">
  <div class="modal">
    <h2 id="modal-title">Новое событие</h2>
    <div class="field">
      <label>Тип</label>
      <div class="type-btns">
        <button class="type-btn" data-t="lesson" onclick="selType('lesson')">Урок</button>
        <button class="type-btn" data-t="work" onclick="selType('work')">Работа</button>
        <button class="type-btn" data-t="uni" onclick="selType('uni')">Пары</button>
        <button class="type-btn" data-t="personal" onclick="selType('personal')">Личное</button>
      </div>
    </div>
    <div class="field" id="modal-student-field" style="display:none">
      <label>Ученик</label><select id="modal-student"></select>
    </div>
    <div class="field" id="modal-title-field" style="display:none">
      <label>Название</label><input type="text" id="modal-ev-title" placeholder="Название">
    </div>
    <div class="row field">
      <div style="flex:1"><label>Начало</label><input type="time" id="modal-start"></div>
      <div style="flex:1"><label>Конец</label><input type="time" id="modal-end"></div>
    </div>
    <div class="field">
      <label>Повторение</label>
      <div class="recur-btns">
        <button class="recur-btn" data-r="once" onclick="selRecur('once')">Один раз</button>
        <button class="recur-btn" data-r="weekly" onclick="selRecur('weekly')">Каждую неделю</button>
        <button class="recur-btn" data-r="biweekly" onclick="selRecur('biweekly')">Раз в 2 недели</button>
      </div>
    </div>
    <div class="modal-actions">
      <button onclick="closeModalDirect()">Отмена</button>
      <button class="primary" onclick="saveEvent()">Сохранить</button>
    </div>
  </div>
</div>

<!-- DELETE MODAL -->
<div class="modal-bg" id="del-modal-bg" onclick="if(event.target===this)document.getElementById('del-modal-bg').classList.remove('open')">
  <div class="del-modal">
    <h2>Удалить событие</h2>
    <p id="del-modal-sub">Это повторяющееся событие</p>
    <div class="del-options" id="del-options"></div>
  </div>
</div>

<script>
const DAYS_SHORT=['Пн','Вт','Ср','Чт','Пт','Сб','Вс'];
const MONTHS_GEN=['января','февраля','марта','апреля','мая','июня','июля','августа','сентября','октября','ноября','декабря'];
const MONTHS_NOM=['январь','февраль','март','апрель','май','июнь','июль','август','сентябрь','октябрь','ноябрь','декабрь'];
const WDFULL=['воскресенье','понедельник','вторник','среда','четверг','пятница','суббота'];
const HOUR_START=7,HOUR_END=23,TOTAL_HOURS=16,CELL_H=48;
const TYPE_LABELS={lesson:'Урок',work:'Работа',uni:'Пары',personal:'Личное'};
const RECUR_LABELS={once:'Один раз',weekly:'Еженедельно',biweekly:'Раз в 2 нед.'};

// ---- STATE ----
let currentProfile=null;
let students=[],events=[],goals=[];
let weekOffset=0,dragEvId=null,dragOffsetFrac=0;
let modalDay=null,modalType='lesson',modalRecur='once';

// ---- PROFILES ----
function getProfiles(){return JSON.parse(localStorage.getItem('profiles')||'[]');}
function saveProfiles(p){localStorage.setItem('profiles',JSON.stringify(p));}
function pkey(k){return'p_'+currentProfile+'_'+k;}

function renderProfileScreen(){
  const profiles=getProfiles();
  const list=document.getElementById('profile-list');
  list.innerHTML=profiles.length?profiles.map(p=>`
    <div class="profile-item" onclick="selectProfile('${p.id}')">
      <div class="profile-avatar">${ini(p.name)}</div>
      <div style="flex:1"><div class="profile-name">${p.name}</div><div class="profile-meta">${p.created}</div></div>
      <button class="small danger" onclick="deleteProfile(event,'${p.id}')">✕</button>
    </div>`).join(''):'<div class="empty">Создай первый профиль</div>';
}

function createProfile(){
  const name=document.getElementById('new-profile-name').value.trim();
  if(!name)return;
  const profiles=getProfiles(),id=uid();
  profiles.push({id,name,created:new Date().toLocaleDateString('ru')});
  saveProfiles(profiles);
  document.getElementById('new-profile-name').value='';
  selectProfile(id);
}

function deleteProfile(e,id){
  e.stopPropagation();
  if(!confirm('Удалить профиль и все данные?'))return;
  saveProfiles(getProfiles().filter(p=>p.id!==id));

// ---- UTILS ----
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2);}
function ini(n){return(n||'?').trim().split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);}
function getSt(id){return students.find(s=>s.id===id)||{name:'?',price:0,id,comment:''};}
function toMin(t){if(!t)return 0;const[h,m]=t.split(':').map(Number);return h*60+m;}
function fromMin(m){return String(Math.floor(m/60)).padStart(2,'0')+':'+String(m%60).padStart(2,'0');}
function durH(s,e){return Math.max(0,(toMin(e)-toMin(s))/60);}
function fmtDur(s,e){const m=toMin(e)-toMin(s);if(m<=0)return'';const h=Math.floor(m/60),mm=m%60;return h&&mm?h+'ч '+mm+'м':h?h+' ч':mm+'м';}
function fmtH(h){const wh=Math.floor(h),wm=Math.round((h-wh)*60);return wh&&wm?wh+'ч '+wm+'м':wh?wh+' ч':wm?wm+'м':'0';}
function fracToTime(f){const tm=HOUR_START*60+Math.round(f*TOTAL_HOURS*60/15)*15;return fromMin(Math.min(tm,HOUR_END*60-15));}
function timeToFrac(t){return(toMin(t)-HOUR_START*60)/(TOTAL_HOURS*60);}
function evEarn(ev){if(ev.type!=='lesson')return 0;return durH(ev.start,ev.end)*(getSt(ev.studentId).price||0);}
function dateKey(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function todayKey(){return dateKey(new Date());}
function pl(n){if(n%10===1&&n%100!==11)return'урок';if(n%10>=2&&n%10<=4&&!(n%100>=12&&n%100<=14))return'урока';return'уроков';}
function parseDate(s){const[y,m,d]=s.split('-').map(Number);return new Date(y,m-1,d);}

// ---- RECURRENCE ENGINE ----
// Generates virtual event instances for a given date key
// events store: {id, recurId, recurType:'once'|'weekly'|'biweekly', date (anchor), deletedDates:[], cutoffDate, ...}
function getEventsForDate(dkey){
  const result=[];
  const target=parseDate(dkey);
  const targetMs=target.getTime();

  events.forEach(ev=>{
    if(ev.recurType==='once'){
      if(ev.date===dkey&&!(ev.deletedDates||[]).includes(dkey)) result.push({...ev,_instanceDate:dkey});
      return;
    }
    const anchor=parseDate(ev.date);
    const anchorMs=anchor.getTime();
    const diffMs=targetMs-anchorMs;
    const diffDays=Math.round(diffMs/86400000);
    if(diffDays<0)return;
    const period=ev.recurType==='weekly'?7:14;
    if(diffDays%period!==0)return;
    if(ev.cutoffDate&&dkey>=ev.cutoffDate)return;
    if((ev.deletedDates||[]).includes(dkey))return;
    result.push({...ev,_instanceDate:dkey});
  });
  return result.sort((a,b)=>toMin(a.start)-toMin(b.start));
}

function getAllEventsForWeek(dates){
  const result=[];
  dates.forEach(d=>{
    getEventsForDate(dateKey(d)).forEach(ev=>result.push(ev));
  });
  return result;
}

// ---- DELETE LOGIC ----
function promptDelete(evId,instanceDate){
  const ev=events.find(e=>e.id===evId);
  if(!ev)return;
  const bg=document.getElementById('del-modal-bg');
  const opts=document.getElementById('del-options');
  const sub=document.getElementById('del-modal-sub');

  if(ev.recurType==='once'){
    // just delete directly
    events=events.filter(e=>e.id!==evId);
    saveData();renderCalendar();
    if(document.getElementById('v-today').classList.contains('active'))renderToday();
    return;
  }

  sub.textContent=`Повторяется ${RECUR_LABELS[ev.recurType].toLowerCase()}`;
  opts.innerHTML=`
    <button class="del-option" onclick="deleteInstance('${evId}','${instanceDate}')">Только это событие (${instanceDate})</button>
    <button class="del-option" onclick="deleteFromHere('${evId}','${instanceDate}')">Это и все следующие</button>
    <button class="del-option red" onclick="deleteAll('${evId}')">Все повторения</button>
    <button class="del-option" onclick="document.getElementById('del-modal-bg').classList.remove('open')" style="color:#6e6e73">Отмена</button>`;
  bg.classList.add('open');
}

function deleteInstance(evId,date){
  const ev=events.find(e=>e.id===evId);
  if(ev){if(!ev.deletedDates)ev.deletedDates=[];ev.deletedDates.push(date);}
  document.getElementById('del-modal-bg').classList.remove('open');
  saveData();renderCalendar();
  if(document.getElementById('v-today').classList.contains('active'))renderToday();
}
function deleteFromHere(evId,date){
  const ev=events.find(e=>e.id===evId);
  if(ev)ev.cutoffDate=date;
  document.getElementById('del-modal-bg').classList.remove('open');
  saveData();renderCalendar();
  if(document.getElementById('v-today').classList.contains('active'))renderToday();
}
function deleteAll(evId){
  events=events.filter(e=>e.id!==evId);
  document.getElementById('del-modal-bg').classList.remove('open');
  saveData();renderCalendar();
  if(document.getElementById('v-today').classList.contains('active'))renderToday();
}

// ---- CLOCK ----
function updateClock(){
  const now=new Date();
  const h=String(now.getHours()).padStart(2,'0'),m=String(now.getMinutes()).padStart(2,'0'),s=String(now.getSeconds()).padStart(2,'0');
  document.getElementById('header-clock').textContent=h+':'+m+':'+s;
  document.getElementById('header-date').textContent=now.getDate()+' '+MONTHS_GEN[now.getMonth()]+' '+now.getFullYear()+' — '+WDFULL[now.getDay()];
  const tl=getEventsForDate(todayKey()).filter(ev=>ev.type==='lesson').length;
  document.getElementById('header-clock-sub').textContent=tl?'сегодня '+tl+' '+pl(tl):'сегодня уроков нет';
  renderNowLine();
}

// ---- TODAY ----
function renderToday(){
  const tkey=todayKey();
  const todayEvs=getEventsForDate(tkey);
  const lessons=todayEvs.filter(ev=>ev.type==='lesson');
  const nowMin=new Date().getHours()*60+new Date().getMinutes();
  const todayIncome=lessons.reduce((s,ev)=>s+evEarn(ev),0);
  const todayH=lessons.reduce((s,ev)=>s+durH(ev.start,ev.end),0);
  const remaining=lessons.filter(ev=>toMin(ev.end)>nowMin).reduce((s,ev)=>s+evEarn(ev),0);
  document.getElementById('today-stats').innerHTML=`
    <div class="today-stat green"><div class="today-stat-val">${Math.round(todayIncome).toLocaleString()} ₽</div><div class="today-stat-lbl">заработаю сегодня</div></div>
    <div class="today-stat blue"><div class="today-stat-val">${Math.round(remaining).toLocaleString()} ₽</div><div class="today-stat-lbl">ещё впереди</div></div>
    <div class="today-stat"><div class="today-stat-val">${lessons.length}</div><div class="today-stat-lbl">уроков</div></div>
    <div class="today-stat"><div class="today-stat-val">${fmtH(todayH)||'—'}</div><div class="today-stat-lbl">часов уроков</div></div>`;
  const tl=document.getElementById('today-timeline');
  if(!todayEvs.length){tl.innerHTML='<div class="empty">Событий нет — добавь в Календаре</div>';return;}
  tl.innerHTML=todayEvs.map(ev=>{
    const isPast=toMin(ev.end||ev.start)<nowMin;
    const st=ev.type==='lesson'?getSt(ev.studentId):null;
    const label=ev.type==='lesson'?st.name:(ev.title||TYPE_LABELS[ev.type]);
    const sub=ev.type==='lesson'&&st?.comment?st.comment:TYPE_LABELS[ev.type];
    const earn=evEarn(ev);
    const recurIcon=ev.recurType&&ev.recurType!=='once'?'↻ ':'';
    return `<div class="tl-item ev-${ev.type}${isPast?' past':''}">
      <div class="tl-time">${ev.start}${ev.end?'–'+ev.end:''}</div>
      <div style="flex:1"><div class="tl-name">${recurIcon}${label}</div><div class="tl-sub">${sub} · ${fmtDur(ev.start,ev.end)}</div></div>
      ${earn>0?`<div class="tl-earn">${Math.round(earn)} ₽</div>`:''}
    </div>`;
  }).join('');
  renderGoals();
}

// ---- WEEK NAV ----
function getWeekStart(offset){
  const now=new Date(),day=now.getDay(),mon=new Date(now);
  mon.setDate(now.getDate()-((day+6)%7)+offset*7);mon.setHours(0,0,0,0);return mon;
}
function weekDates(offset){
  const mon=getWeekStart(offset);
  return Array.from({length:7},(_,i)=>{const d=new Date(mon);d.setDate(mon.getDate()+i);return d;});
}
function shiftWeek(n){weekOffset+=n;renderCalendar();}
function goToday(){weekOffset=0;renderCalendar();}

// ---- CALENDAR ----
function renderCalendar(){
  const dates=weekDates(weekOffset),tkey=todayKey();
  const ws=dates[0],we=dates[6];
  document.getElementById('week-label').textContent=ws.getDate()+' '+MONTHS_NOM[ws.getMonth()]+' — '+we.getDate()+' '+MONTHS_NOM[we.getMonth()]+' '+we.getFullYear();
  const grid=document.getElementById('cal-grid');grid.innerHTML='';
  // header
  const corner=document.createElement('div');corner.className='cal-time-head';grid.appendChild(corner);
  dates.forEach((d,i)=>{
    const cell=document.createElement('div');cell.className='cal-head-cell'+(dateKey(d)===tkey?' today-col':'');
    cell.innerHTML=`<div style="font-size:11px">${DAYS_SHORT[i]}</div><div class="cal-day-num">${d.getDate()}</div>`;
    grid.appendChild(cell);
  });
  const body=document.createElement('div');body.className='cal-body';grid.appendChild(body);
  // time col
  const timeCol=document.createElement('div');timeCol.className='cal-time-col';
  for(let h=HOUR_START;h<HOUR_END;h++){
    const slot=document.createElement('div');slot.className='cal-time-slot';slot.textContent=String(h).padStart(2,'0')+':00';timeCol.appendChild(slot);
  }
  body.appendChild(timeCol);
  // day cols
  dates.forEach(d=>{
    const dkey=dateKey(d);
    const col=document.createElement('div');col.className='cal-day-col'+(dkey===tkey?' today-col':'');
    for(let h=0;h<TOTAL_HOURS;h++){
      const line=document.createElement('div');line.className='cal-hour-line';line.style.top=(h*CELL_H)+'px';col.appendChild(line);
      const half=document.createElement('div');half.className='cal-half-line';half.style.top=(h*CELL_H+CELL_H/2)+'px';col.appendChild(half);
    }
    // drop zone
    const dz=document.createElement('div');dz.className='cal-drop-zone';
    dz.addEventListener('dragover',e=>{e.preventDefault();dz.classList.add('drag-over');});
    dz.addEventListener('dragleave',()=>dz.classList.remove('drag-over'));
    dz.addEventListener('drop',e=>{
      e.preventDefault();dz.classList.remove('drag-over');if(!dragEvId)return;
      const {evId,instanceDate}=JSON.parse(dragEvId);
      const rect=col.getBoundingClientRect();
      const frac=Math.max(0,Math.min(1,(e.clientY-rect.top)/(TOTAL_HOURS*CELL_H)));
      const ev=events.find(ev=>ev.id===evId);if(!ev)return;
      const dur=toMin(ev.end)-toMin(ev.start);
      const ns=fracToTime(Math.max(0,frac-dragOffsetFrac));
      const nsm=toMin(ns),nem=Math.min(HOUR_END*60,nsm+dur);
      // moving a recurring event: treat as "delete this instance, create new once at new position"
      if(ev.recurType!=='once'&&dkey!==instanceDate){
        if(!ev.deletedDates)ev.deletedDates=[];ev.deletedDates.push(instanceDate);
        events.push({id:uid(),recurId:null,recurType:'once',date:dkey,type:ev.type,start:fromMin(nsm),end:fromMin(nem),studentId:ev.studentId,title:ev.title});
      } else {
        ev.date=dkey;ev.start=fromMin(nsm);ev.end=fromMin(nem);
      }
      saveData();renderCalendar();
      if(document.getElementById('v-today').classList.contains('active'))renderToday();
    });
    dz.addEventListener('click',e=>{
      if(e.target.closest('.cal-event'))return;
      const rect=col.getBoundingClientRect();
      const frac=Math.max(0,Math.min(1,(e.clientY-rect.top)/(TOTAL_HOURS*CELL_H)));
      openModal(dkey,frac);
    });
    col.appendChild(dz);
    // events
    getEventsForDate(dkey).forEach(ev=>{
      const sf=timeToFrac(ev.start),ef=timeToFrac(ev.end||ev.start);
      const top=sf*TOTAL_HOURS*CELL_H,height=Math.max(22,(ef-sf)*TOTAL_HOURS*CELL_H);
      const el=document.createElement('div');el.className='cal-event ev-'+ev.type;
      el.style.cssText=`top:${top}px;height:${height}px`;el.draggable=true;
      const st=ev.type==='lesson'?getSt(ev.studentId):null;
      const label=ev.type==='lesson'?st.name:(ev.title||TYPE_LABELS[ev.type]);
      const comment=ev.type==='lesson'&&st?.comment?st.comment:'';
      const recurIcon=ev.recurType&&ev.recurType!=='once'?'↻ ':'';
      el.innerHTML=`
        <div class="cal-event-name">${recurIcon}${label}</div>
        <div class="cal-event-time">${ev.start}–${ev.end} ${fmtDur(ev.start,ev.end)}</div>
        ${comment?`<div class="cal-event-comment">${comment}</div>`:''}
        <button class="del-btn" onclick="promptDelete('${ev.id}','${ev._instanceDate}');event.stopPropagation()">✕</button>`;
      el.addEventListener('dragstart',e=>{
        dragEvId=JSON.stringify({evId:ev.id,instanceDate:ev._instanceDate});
        const rect=el.getBoundingClientRect();dragOffsetFrac=(e.clientY-rect.top)/(TOTAL_HOURS*CELL_H);
        e.dataTransfer.effectAllowed='move';setTimeout(()=>el.style.opacity='0.4',0);
      });
      el.addEventListener('dragend',()=>{el.style.opacity='';dragEvId=null;});
      col.appendChild(el);
    });
    if(dkey===tkey){const nl=document.createElement('div');nl.className='now-line';nl.id='now-line';col.appendChild(nl);}
    body.appendChild(col);
  });
  renderNowLine();
}

function renderNowLine(){
  const nl=document.getElementById('now-line');if(!nl)return;
  const now=new Date();const frac=timeToFrac(String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0'));
  if(frac<0||frac>1){nl.style.display='none';return;}
  nl.style.display='block';nl.style.top=(frac*TOTAL_HOURS*CELL_H)+'px';
  nl.innerHTML='<div class="now-line-inner"><div class="now-dot"></div></div>';
}

function selType(t){
  modalType=t;

function saveEvent(){
  const start=document.getElementById('modal-start').value,end=document.getElementById('modal-end').value;
  if(!start||!end||!modalDay)return;
  if(toMin(end)<=toMin(start)){alert('Конец должен быть позже начала');return;}

// ---- STATS ----
function renderStats(){
  const dates=weekDates(weekOffset);
  const weekEvs=getAllEventsForWeek(dates).filter(ev=>ev.type==='lesson');
  let totalH=0,totalIncome=0;const bySt={};
  weekEvs.forEach(ev=>{
    const h=durH(ev.start,ev.end),earn=evEarn(ev);totalH+=h;totalIncome+=earn;
    const st=getSt(ev.studentId);
    if(!bySt[ev.studentId])bySt[ev.studentId]={name:st.name,price:st.price||0,count:0,hours:0,income:0};
    bySt[ev.studentId].count++;bySt[ev.studentId].hours+=h;bySt[ev.studentId].income+=earn;
  });
  document.getElementById('stat-grid').innerHTML=`
    <div class="stat-card"><div class="stat-val">${weekEvs.length}</div><div class="stat-lbl">уроков в неделю</div></div>
    <div class="stat-card"><div class="stat-val">${fmtH(totalH)}</div><div class="stat-lbl">часов уроков</div></div>
    <div class="stat-card"><div class="stat-val">${Math.round(totalIncome).toLocaleString()} ₽</div><div class="stat-lbl">доход в неделю</div></div>
    <div class="stat-card"><div class="stat-val">${Math.round(totalIncome*4).toLocaleString()} ₽</div><div class="stat-lbl">~доход в месяц</div></div>`;
  const rows=Object.values(bySt);
  document.getElementById('income-breakdown').innerHTML=rows.length?rows.sort((a,b)=>b.income-a.income).map(r=>`
    <div class="price-row">
      <div class="avatar">${ini(r.name)}</div>
      <div style="flex:1;margin-left:6px"><div>${r.name}</div><div style="font-size:11px;color:#8e8e93">${r.count} ур. · ${fmtH(r.hours)} · ${r.price} ₽/ч</div></div>
      <div style="font-weight:600">${Math.round(r.income).toLocaleString()} ₽</div>
    </div>`).join(''):'<div class="empty">Нет уроков на этой неделе</div>';
  const maxI=Math.max(...dates.map(d=>{
    const di=getEventsForDate(dateKey(d)).filter(ev=>ev.type==='lesson').reduce((s,ev)=>s+evEarn(ev),0);return di;
  }),1);
  document.getElementById('days-breakdown').innerHTML=DAYS_SHORT.map((d,i)=>{
    const dk=dateKey(dates[i]),dl=getEventsForDate(dk).filter(ev=>ev.type==='lesson'),di=dl.reduce((s,ev)=>s+evEarn(ev),0);
    return `<div class="bar-row"><span style="font-size:12px;color:#6e6e73;min-width:22px">${d}</span><div class="bar-track"><div class="bar-fill" style="width:${di?Math.round(di/maxI*100):0}%"></div></div><span style="font-size:12px;color:#6e6e73;min-width:16px;text-align:right">${dl.length}</span><span style="font-size:12px;color:#34c759;min-width:60px;text-align:right">${di?Math.round(di).toLocaleString()+' ₽':''}</span></div>`;
  }).join('');
}

// ---- TAB SWITCH ----
function sw(t){
  ['today','calendar','stats','students'].forEach(v=>document.getElementById('v-'+v).classList.toggle('active',v===t));
  document.querySelectorAll('.tab').forEach((el,i)=>el.classList.toggle('active',['today','calendar','stats','students'][i]===t));
  if(t==='today')renderToday();
  if(t==='calendar')renderCalendar();
  if(t==='stats')renderStats();
}

function render(){renderToday();renderStudentsList();}

// ---- INIT ----
(function(){
  renderProfileScreen();
  const last=localStorage.getItem('last_profile');
  if(last&&getProfiles().find(p=>p.id===last)){selectProfile(last);}
  else document.getElementById('profile-screen').style.display='flex';
  if('serviceWorker' in navigator)navigator.serviceWorker.register('sw.js').catch(()=>{});
})();
</script>
